services:
  db:
    image: postgres:16-alpine
    container_name: driveportal-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: driveportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d driveportal"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driveportal-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/driveportal?schema=public
      JWT_SECRET: replace-this-with-a-long-random-secret
      ALLOW_SELF_REGISTRATION: "false"
      STORAGE_DRIVER: local
      LOCAL_UPLOAD_DIR: uploads
      S3_REGION: ""
      S3_BUCKET: ""
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_uploads:/app/uploads
    command: >
      sh -c "npx prisma migrate deploy &&
             npm run seed:admin &&
             npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: driveportal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  backend_uploads:
